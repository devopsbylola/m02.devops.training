version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p .pip_cache
blocks:
  - name: Install Dependencies
    dependencies: []
    task:
      jobs:
        - name: Setup
          commands:
            - cache restore
            - pip install pytest requests flask coverage locust
            - cache store
  - name: Unit Tests
    dependencies:
      - Install Dependencies
    task:
      jobs:
        - name: Tests
          commands:
            - cache restore
            - cd 1-tdd && python -m pytest test_factorial.py -v
            - cd ..
            - cd 2-unit-testing && python -m pytest test_math_sum.py -v
  - name: Integration tests
    dependencies:
      - Unit Tests
    task:
      jobs:
        - name: Tests
          commands:
            - cache restore
            - cd 3-integration-testing && python -m pytest test_integration.py -v
            - cd ..
            - cd 6-mocking && python -m pytest test_weather_service.py -v
            - cd ..
            - cd 10-database-testing && python -m pytest test_database.py -v
  - name: End-to-end tests
    dependencies:
      - Integration tests
    task:
      jobs:
        - name: Tests
          commands:
            - cache restore
            - cd 4-e2e && pip install -r requirements.txt && nohup python app.py &
            - sleep 3
            - cd 4-e2e && python -m pytest test_e2e.py -v
  - name: Test coverage
    dependencies:
      - End-to-end tests
    task:
      jobs:
        - name: Tests
          commands:
            - cache restore
            - cd 7-test-coverage
            - pip install coverage
            - coverage run -m pytest test_calculator.py -v
            - coverage report -m
  - name: Security tests
    dependencies:
      - Test coverage
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 9-security-testing
            - 'nohup python -c "import sys; sys.path.insert(0, ''../4-e2e''); from app import'
            - app; app.run()" &
            - sleep 3
            - python -m pytest test_security.py -v
  - name: Test reports
    dependencies:
      - Security tests
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 5-test-reports
            - pip install -r requirements.txt
            - pytest --junitxml=reports.xml
            - '[[ -f report.xml ]] && test-results publish report.xml'
after_pipeline:
  task:
    jobs:
      - name: 'Job #1'
        commands:
          - test-results gen-pipeline-report
